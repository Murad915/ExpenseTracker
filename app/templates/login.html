{% extends "base.html" %}

{% block title %}Sign In — ExpenseTracker{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="w-full max-w-sm">

        <!-- Brand mark -->
        <div class="text-center mb-8">
            <div class="w-12 h-12 rounded-2xl bg-emerald-500/15 border border-emerald-500/25
                        flex items-center justify-center mx-auto mb-4">
                <span class="text-emerald-400 font-bold text-lg">$</span>
            </div>
            <h1 class="text-2xl font-bold text-slate-100 tracking-tight">Welcome back</h1>
            <p class="text-slate-500 text-sm mt-1.5">Sign in to your account to continue</p>
        </div>

        <!-- Card -->
        <div class="bg-slate-900 rounded-2xl border border-slate-800/60 shadow-xl p-7">
            <form method="POST" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">
                        Username
                    </label>
                    <input type="text" name="username" required autofocus
                        class="w-full bg-slate-800/60 border border-slate-700 rounded-xl px-4 py-2.5 text-sm
                               text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2
                               focus:ring-emerald-500/30 focus:border-emerald-500 transition-all">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">
                        Password
                    </label>
                    <input type="password" name="password" required
                        class="w-full bg-slate-800/60 border border-slate-700 rounded-xl px-4 py-2.5 text-sm
                               text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2
                               focus:ring-emerald-500/30 focus:border-emerald-500 transition-all">
                </div>
                <div class="pt-1">
                    <button type="submit"
                        class="w-full bg-emerald-600 hover:bg-emerald-500 active:bg-emerald-700 text-white
                               font-semibold text-sm px-4 py-3 rounded-xl transition-all duration-150
                               shadow-lg shadow-emerald-900/40">
                        Sign in
                    </button>
                </div>
            </form>
        </div>

        <p class="text-center text-sm text-slate-600 mt-5">
            Don't have an account?
            <a href="{{ url_for('auth.register') }}"
               class="text-emerald-400 hover:text-emerald-300 font-medium transition-colors">
                Create one
            </a>
        </p>

    </div>
</div>
{% endblock %}
